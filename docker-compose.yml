services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PORT: 8000
      CLIENT_URL: http://bnlaw-dev-travel.com
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      API_URL: http://server:8000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
